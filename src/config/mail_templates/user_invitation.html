<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>You're invited to {{site_name}}</title>
  </head>
  <body style="margin:0;padding:0;background:#f6f8fb;color:#182230;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
    <div style="max-width:640px;margin:0 auto;padding:32px 18px;">
      <p style="margin:0 0 16px;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#2563eb;">{{site_name}}</p>
      <div style="background:#fff;border:1px solid #dbe4f0;border-radius:12px;padding:28px;">
        <h1 style="margin:0 0 16px;font-size:24px;line-height:1.3;color:#0f172a;">Create your account</h1>
        <p style="margin:0 0 16px;font-size:15px;line-height:1.7;">An administrator invited {{email}} to join {{site_name}}.</p>
        <p style="margin:0 0 24px;font-size:15px;line-height:1.7;">This invitation expires in {{expires_in}} and can only be used once.</p>
        <p style="margin:0 0 24px;">
          <a href="{{invitation_url}}" style="display:inline-block;padding:12px 20px;border-radius:8px;background:#2563eb;color:#fff;text-decoration:none;font-size:15px;font-weight:600;">Accept invitation</a>
        </p>
        <p style="margin:0 0 8px;font-size:13px;line-height:1.7;color:#475569;">If the button does not work, open this link:</p>
        <p style="margin:0;font-size:13px;line-height:1.7;word-break:break-all;"><a href="{{invitation_url}}" style="color:#2563eb;text-decoration:underline;">{{invitation_url}}</a></p>
      </div>
    </div>
  </body>
</html>
