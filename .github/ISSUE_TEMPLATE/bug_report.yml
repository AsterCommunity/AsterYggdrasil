name: Bug Report
description: Report a reproducible problem in AsterYggdrasil
title: "[Bug]: "
labels: ["Bug", "Wait For More Info"]
assignees:
  - AptS-1547
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please remove secrets, tokens, passwords, bucket keys, and private hostnames from any logs or configuration snippets.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem and the user-visible impact.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: AsterYggdrasil version
      placeholder: e.g. v0.1.0, stable Docker tag, or commit SHA
    validations:
      required: true

  - type: dropdown
    id: installation
    attributes:
      label: Installation method
      options:
        - Docker / Compose
        - Pre-built binary
        - Built from source
        - Other
    validations:
      required: true

  - type: dropdown
    id: database
    attributes:
      label: Database backend
      options:
        - SQLite
        - PostgreSQL
        - MySQL
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area involved
      options:
        - Runtime / startup
        - Authentication
        - Admin API
        - Audit logs
        - Background tasks
        - Frontend panel
        - Database
        - Not sure
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS / distro:
        - Browser:
        - Reverse proxy:
        - Deployment notes:

  - type: textarea
    id: logs
    attributes:
      label: Error messages / logs
      description: Include the API error code and relevant server logs if available. Remove secrets before posting.
      render: shell

  - type: textarea
    id: config
    attributes:
      label: Relevant configuration
      description: Include only the parts related to the bug and replace sensitive values with placeholders.
      render: toml

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I have checked the documentation and FAQ
          required: true
        - label: I have removed secrets and private credentials from this report
          required: true
