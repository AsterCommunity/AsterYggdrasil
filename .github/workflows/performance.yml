name: Performance Benchmarks

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build frontend
        working-directory: frontend-panel
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Start release-performance server
        run: |
          mkdir -p /tmp/asteryggdrasil-perf/tmp
          ASTER__SERVER__HOST=127.0.0.1 \
          ASTER__SERVER__PORT=3000 \
          ASTER__AUTH__BOOTSTRAP_INSECURE_COOKIES=true \
          ASTER__DATABASE__URL="sqlite:///tmp/asteryggdrasil-perf/asteryggdrasil.db?mode=rwc" \
          ASTER__SERVER__TEMP_DIR="/tmp/asteryggdrasil-perf/tmp" \
          cargo run --profile release-performance > /tmp/asteryggdrasil-perf/server.log 2>&1 &
          echo $! > /tmp/asteryggdrasil-perf/server.pid

      - name: Wait for server readiness
        run: |
          for i in $(seq 1 120); do
            if curl -fsS http://127.0.0.1:3000/health/ready >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/asteryggdrasil-perf/server.log
          exit 1

      - name: Run smoke benchmarks
        env:
          ASTER_BENCH_BASE_URL: http://127.0.0.1:3000
          ASTER_BENCH_SUMMARY_DIR: tests/performance/results/ci-smoke
        run: |
          mkdir -p tests/performance/results/ci-smoke
          k6 run tests/performance/k6/runtime-smoke.js

      - name: Upload smoke summaries
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: performance-smoke-summaries
          if-no-files-found: ignore
          path: tests/performance/results/ci-smoke

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/asteryggdrasil-perf/server.pid ]; then
            kill "$(cat /tmp/asteryggdrasil-perf/server.pid)" || true
          fi
