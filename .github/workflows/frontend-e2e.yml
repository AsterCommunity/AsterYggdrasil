name: E2E

on:
  push:
    branches: [master]
    paths:
      - 'frontend-panel/**'
      - 'src/**'
      - 'migration/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'build.rs'
      - '.github/workflows/frontend-e2e.yml'
  pull_request:
    branches: [master, develop]
    paths:
      - 'frontend-panel/**'
      - 'src/**'
      - 'migration/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'build.rs'
      - '.github/workflows/frontend-e2e.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: frontend-panel
        run: bun install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend-panel
        run: bun run build

      - name: Build E2E server
        run: cargo build --no-default-features --features server --target-dir target/e2e

      - name: Install Playwright browser
        working-directory: frontend-panel
        run: PLAYWRIGHT_BROWSERS_PATH=.playwright bunx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend-panel
        run: PLAYWRIGHT_BROWSERS_PATH=.playwright ASTER_E2E_SKIP_BUILD=1 bun run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            frontend-panel/playwright-report
            frontend-panel/test-results
